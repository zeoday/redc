name: Release GUI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GO_VERSION: 1.22.1
  NODE_VERSION: 20

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get npm cache directory
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build macOS
        run: wails build -platform darwin/universal
        env:
          CGO_ENABLED: 1

      - name: Package as zip
        run: |
          cd build/bin
          zip -r redc-gui-macos-universal.zip redc-gui.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: redc-gui-macos
          path: build/bin/redc-gui-macos-universal.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\npm-cache
            ~\AppData\Local\go-build
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build Windows
        run: wails build -platform windows/amd64
        env:
          CGO_ENABLED: 1

      - name: Package as zip
        run: |
          cd build/bin
          Compress-Archive -Path redc-gui.exe -DestinationPath redc-gui-windows-amd64.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: redc-gui-windows
          path: build/bin/redc-gui-windows-amd64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Get npm cache directory
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build Linux
        run: wails build -platform linux/amd64 -tags webkit2_41
        env:
          CGO_ENABLED: 1

      - name: Package as tar.gz
        run: |
          cd build/bin
          tar -czf redc-gui-linux-amd64.tar.gz redc-gui

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: redc-gui-linux
          path: build/bin/redc-gui-linux-amd64.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: redc-gui-macos
          path: dist/macos

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: redc-gui-windows
          path: dist/windows

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: redc-gui-linux
          path: dist/linux

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/macos/*
            dist/windows/*
            dist/linux/*
          generate_release_notes: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GH_TOKEN }}
